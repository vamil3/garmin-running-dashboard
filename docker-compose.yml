version: '3.8'

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://garmin:garmin123@timescaledb:5432/garmin_db
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
    _PIP_ADDITIONAL_REQUIREMENTS: 'garminconnect psycopg2-binary'
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./ingestion:/opt/airflow/ingestion
    - ./.env:/opt/airflow/.env
    - ./garmin_tokens:/opt/airflow/garmin_tokens
  depends_on:
    timescaledb:
      condition: service_healthy

services:

  # ── DATABASE ──────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: garmin_timescaledb
    environment:
      POSTGRES_USER: garmin
      POSTGRES_PASSWORD: garmin123
      POSTGRES_DB: garmin_db
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U garmin -d garmin_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── AIRFLOW INIT ──────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: garmin_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init &&
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password admin123
    restart: on-failure

  # ── AIRFLOW WEBSERVER ─────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: garmin_airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    restart: always

  # ── AIRFLOW SCHEDULER ─────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: garmin_airflow_scheduler
    command: scheduler
    restart: always

  # ── GRAFANA ───────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: garmin_grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: 'false'
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - timescaledb

volumes:
  timescale_data:
  grafana_data: